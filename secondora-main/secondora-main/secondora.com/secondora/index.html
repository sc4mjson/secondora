<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secondora - Focus Timer</title>

    <!-- SEO Meta Tags -->
    <meta name="description"
        content="Online timer for study and focus sessions. Free countdown timer with sound alarm, aesthetic pomodoro timer, and much more!">

    <!-- SEO Keywords for Multiple Languages -->
    <meta name="keywords"
        content="Online timer for study and focus sessions, Free countdown timer with sound alarm, Minimalist pomodoro timer online, 5 minute timer online free, 10 minute timer with alarm, 30 minute study timer, 1 hour countdown timer, Fullscreen stopwatch and interval timer, Aesthetic focus timer with dark mode, Exam countdown timer online, Simple and fast web timer app, Online zamanlayıcı ders ve odak için, Ücretsiz geri sayım sayacı alarm sesli, Minimalist pomodoro sayacı online, 5 dakika zamanlayıcı ücretsiz, 10 dakika alarm sesli sayaç, 30 dakika ders çalışma sayacı, 1 saatlik geri sayım sayacı, Tam ekran kronometre ve interval sayacı, Karanlık modlu estetik odak zamanlayıcı, Sınav geri sayım sayacı online, Basit ve hızlı web zamanlayıcı uygulaması, Temporizador en línea para estudio, Cuenta regresiva gratuita con alarma, Temporizador pomodoro minimalista, Temporizador de 5 minutos gratis, Temporizador de 10 minutos con sonido, Temporizador de 30 minutos para estudiar, Cuenta regresiva de 1 hora, Cronómetro pantalla completa, Temporizador estético modo oscuro, Cuenta regresiva para exámenes, Aplicación web rápida de temporizador, Online Timer für Lernen und Fokus, Kostenloser Countdown Timer mit Alarm, Minimalistischer Pomodoro Timer, 5 Minuten Timer online gratis, 10 Minuten Timer mit Ton, 30 Minuten Lern Timer, 1 Stunde Countdown Timer, Vollbild Stoppuhr online, Ästhetischer Fokus Timer Dark Mode, Prüfungs Countdown Timer, Schnelle Timer Web App, Minuteur en ligne pour étude, Compte à rebours gratuit avec alarme, Minuteur pomodoro minimaliste, Minuteur 5 minutes gratuit, Minuteur 10 minutes avec son, Minuteur 30 minutes étude, Compte à rebours 1 heure, Chronomètre plein écran en ligne, Minuteur esthétique mode sombre, Compte à rebours examen, Application web rapide de minuteur, Temporizador online para estudo e foco, Contagem regressiva gratuita com alarme, Temporizador pomodoro minimalista, Temporizador de 5 minutos grátis, Temporizador de 10 minutos com som, Temporizador de 30 minutos para estudar, Contagem regressiva de 1 hora, Cronômetro tela cheia online, Temporizador estético modo escuro, Contagem regressiva para exames, Aplicativo web simples e rápido de temporizador">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0f0f14;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            text-align: center;
            padding: 0 20px 40px 20px;
        }

        /* Google Ads */
        .ad-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .ad-box {
            width: 350px;
            height: 100px;
            background: #1e1e2f;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
            font-size: 14px;
            margin: -10px 0;
        }

        /* Top Ads Responsive */
        .ad-container.top-ads {
            flex-wrap: wrap;
            justify-content: space-between;
            width: 100%;
            max-width: 1000px;
        }

        .ad-container.top-ads .ad-box {
            width: 48%;
        }

        /* Bottom Ad */
        .ad-container.bottom-ad {
            flex-direction: column;
            justify-content: center;
            width: 100%;
            margin-top: 20px;
        }

        .ad-container.bottom-ad .ad-box {
            width: 90%;
            margin: 0 auto;
        }

        /* Main App */
        .app {
            width: 100%;
            max-width: 480px;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logo */
        .logo-wrapper {
            margin: 40px 0 20px 0;
        }

        .logo {
            width: 250px;
            transition: 0.7s ease;
        }

        .logo:hover {
            transform: scale(1.1);
        }

        /* Timer Card */
        .timer-card {
            width: 100%;
            max-width: 480px;
            padding: 40px 20px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 40px rgba(124, 92, 255, 0.2);
            margin-bottom: 20px;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 220px;
        }

        .timer-card:hover {
            box-shadow: 0 0 60px rgba(124, 92, 255, 0.4);
        }

        .timer {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        /* Time labels centered */
        .time-labels {
            font-size: 20px;
            font-weight: 600;
            color: #cccccc;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .time-labels span {
            margin: 5px;
        }

        /* Time Input */
        .time-input {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        .time-input input {
            width: 90px;
            padding: 12px;
            border-radius: 14px 0 0 14px;
            border: none;
            background: #1e1e2f;
            color: white;
            text-align: center;
        }

        .time-input select {
            padding: 12px;
            border-radius: 0 14px 14px 0;
            border: none;
            background: #7c5cff;
            color: white;
        }

        /* Controls */
        .controls button {
            background: #7c5cff;
            border: none;
            padding: 14px 22px;
            margin: 6px;
            border-radius: 14px;
            color: white;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .controls button:hover {
            transform: translateY(-2px);
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .logo {
                width: 200px;
            }

            .timer {
                font-size: 50px;
            }

            .time-input input {
                width: 70px;
            }

            .time-input select {
                padding: 10px;
            }

            .ad-container.top-ads .ad-box {
                width: 100%;
                max-height: 100%;
                height: 200px;
            }

            .ad-container.bottom-ad .ad-box {
                width: 90%;
            }
        }
    </style>
</head>

<body>

    <!-- Top Ads -->
    <div class="ad-container top-ads">
        <div class="ad-box">Google ads</div>
    </div>

    <!-- Main App -->
    <div class="app">
        <!-- Logo -->
        <div class="logo-wrapper">
            <img src="secondora.png" alt="Secondora Logo" class="logo">
        </div>

        <!-- Timer Card -->
        <div class="timer-card">
            <div class="timer" id="timer"></div>
            <div class="time-labels" id="timeLabels">
                <span id="days" class="time-unit">0 Day</span>
                <span id="hours" class="time-unit">00 Hours</span>
                <span id="minutes" class="time-unit">00 Minutes</span>
                <span id="seconds" class="time-unit">00 Seconds</span>
            </div>
        </div>

        <!-- Time Setup -->
        <div class="time-input">
            <input type="number" id="timeValue" value="25" min="1">
            <select id="timeUnit">
                <option value="seconds">Seconds</option>
                <option value="minutes" selected>Minutes</option>
                <option value="hours">Hours</option>
                <option value="days">Days</option>
            </select>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button id="start">Start</button>
            <button id="pause">Pause</button>
            <button id="reset">Reset</button>
        </div>
    </div>

    <!-- Bottom Ad -->
    <div class="ad-container bottom-ad">
        <div class="ad-box">Google ads</div>
    </div>

    <script>
        let totalSeconds;
        let timerInterval = null;
        let isRunning = false;

        const timerDisplay = document.getElementById("timer");
        const startBtn = document.getElementById("start");
        const pauseBtn = document.getElementById("pause");
        const resetBtn = document.getElementById("reset");
        const timeValueInput = document.getElementById("timeValue");
        const timeUnitSelect = document.getElementById("timeUnit");

        function convertToSeconds(value, unit) {
            switch (unit) {
                case "seconds": return value;
                case "minutes": return value * 60;
                case "hours": return value * 3600;
                case "days": return value * 86400;
                default: return value;
            }
        }

        function formatTime(seconds) {
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            const selectedUnit = timeUnitSelect.value;

            // Reset display
            document.getElementById("days").style.display = "inline";
            document.getElementById("hours").style.display = "inline";
            document.getElementById("minutes").style.display = "inline";
            document.getElementById("seconds").style.display = "inline";

            if (selectedUnit === "days") {
                document.getElementById("days").textContent = `${days} Day${days !== 1 ? 's' : ''}`;
                document.getElementById("hours").textContent = `${String(hours).padStart(2, "0")} Hours`;
                document.getElementById("minutes").textContent = `${String(minutes).padStart(2, "0")} Minutes`;
                document.getElementById("seconds").textContent = `${String(secs).padStart(2, "0")} Seconds`;
            } else if (selectedUnit === "hours") {
                document.getElementById("hours").textContent = `${String(hours).padStart(2, "0")} Hours`;
                document.getElementById("minutes").textContent = `${String(minutes).padStart(2, "0")} Minutes`;
                document.getElementById("seconds").textContent = `${String(secs).padStart(2, "0")} Seconds`;
                document.getElementById("days").style.display = "none";
            } else if (selectedUnit === "minutes") {
                document.getElementById("minutes").textContent = `${String(minutes).padStart(2, "0")} Minutes`;
                document.getElementById("seconds").textContent = `${String(secs).padStart(2, "0")} Seconds`;
                document.getElementById("hours").style.display = "none";
                document.getElementById("days").style.display = "none";
            } else if (selectedUnit === "seconds") {
                document.getElementById("seconds").textContent = `${String(seconds).padStart(2, "0")} Seconds`;
                document.getElementById("minutes").style.display = "none";
                document.getElementById("hours").style.display = "none";
                document.getElementById("days").style.display = "none";
            }
        }

        function updateDisplay() {
            formatTime(totalSeconds);
        }

        function showAds() {
            document.querySelectorAll(".ad-box").forEach(ad => ad.style.display = "flex");
        }

        function hideAds() {
            document.querySelectorAll(".ad-box").forEach(ad => ad.style.display = "none");
        }

        function startTimer() {
            if (isRunning) return;

            totalSeconds = convertToSeconds(parseInt(timeValueInput.value), timeUnitSelect.value);
            updateDisplay();
            hideAds();

            isRunning = true;

            timerInterval = setInterval(() => {
                if (totalSeconds > 0) {
                    totalSeconds--;
                    updateDisplay();
                } else {
                    clearInterval(timerInterval);
                    isRunning = false;
                    showAds();
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            showAds();
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            totalSeconds = convertToSeconds(parseInt(timeValueInput.value), timeUnitSelect.value);
            updateDisplay();
            showAds();
        }

        totalSeconds = convertToSeconds(parseInt(timeValueInput.value), timeUnitSelect.value);
        updateDisplay();

        startBtn.addEventListener("click", startTimer);
        pauseBtn.addEventListener("click", pauseTimer);
        resetBtn.addEventListener("click", resetTimer);

        timeUnitSelect.addEventListener("change", updateDisplay);
    </script>
</body>

</html>
