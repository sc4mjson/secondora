<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Secondora</title>
    <style>
        /* Genel Tema */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0f14;
            color: #ddd;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        /* Container */
        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background-color: #1e1e2f;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(124, 92, 255, 0.3);
            text-align: center;
        }

        /* Başlık ve paragraf */
        h1 {
            color: #fff;
            margin-bottom: 20px;
        }

        p {
            margin-bottom: 20px;
            line-height: 1.6;
        }

        /* Form */
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input,
        textarea {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            width: 100%;
            background-color: #0f0f14;
            color: #fff;
            resize: vertical;
        }

        button {
            background-color: #7c5cff;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #5a3ecf;
        }

        /* Back to Home Button */
        .back-home {
            display: inline-block;
            margin-top: 20px;
            color: #7c5cff;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-home:hover {
            text-decoration: underline;
        }

        /* Footer */
        footer {
            margin-top: 40px;
            padding: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            color: #888;
        }

        footer a {
            color: #7c5cff;
            text-decoration: none;
            margin: 0 10px;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width:480px) {
            .container {
                margin: 20px;
                padding: 20px;
            }

            button,
            input,
            textarea {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Contact Us</h1>
        <p>Send us a message using the form below.</p>

        <form action="#" method="post">
            <input type="text" name="name" placeholder="Name Surname" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <textarea name="message" placeholder="Your Message" required></textarea>
            <button type="submit">Send</button>
        </form>

        <a href="index.html" class="back-home">← Back to Home</a>
    </div>

    <footer>
        <p>© 2026 Secondora.com</p>
        <a href="privacy.html">Privacy Policy</a>
    </footer>

</body>

</html>
